<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listizd</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root[data-theme="dark"] {
      --bg:        #0d0d0f;
      --bg-card:   #161618;
      --bg-input:  #1c1c1f;
      --border:    rgba(255,255,255,0.08);
      --text:      #f0ede8;
      --text-muted:#7a7870;
      --accent:    #44bba4;
      --accent-dim:rgba(201,169,110,0.15);
      --shadow:    rgba(0,0,0,0.6);
    }
    :root[data-theme="light"] {
      --bg:        #f7f5f2;
      --bg-card:   #ffffff;
      --bg-input:  #eceae6;
      --border:    rgba(0,0,0,0.08);
      --text:      #1a1917;
      --text-muted:#8a8680;
      --accent:    #2f8272;
      --accent-dim:#8ed6c8;
      --shadow:    rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-family: 'Vremena Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    .serif { font-family: 'Instrument Serif', serif; }

    /* Layout */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative; z-index: 1;
    }

    /* Header */
    header {
      padding: 28px 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex; align-items: baseline; gap: 6px;
    }
    .logo-word {
      font-family: 'Instrument Serif', serif;
      font-family: 'Vremena Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      
      font-size: 1.25rem;
      color: var(--text);
    }
    .logo-dot { color: var(--accent); font-size: 1.5rem; line-height: 1; }

    /* Theme toggle */
    .theme-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 15px;
    }
    .theme-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 64px 0 48px;
    }
    .hero-title {
      font-family: 'Instrument Serif', serif;
      font-family: 'Vremena Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 12px;
    }
    .hero-title em {
      font-style: italic;
      color: var(--accent);
    }
    .hero-sub {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* Input area */
    .input-section {
      max-width: 620px;
      margin: 0 auto;
      padding: 0 0 56px;
    }
    .input-box {
      display: flex;
      gap: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px 6px 6px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-family: 'Vremena Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 0.875rem;
      font-weight: 400;
    }
    .url-input::placeholder { color: var(--text-muted); }

    .fetch-btn {
      background: var(--accent);
      color: #1a1200;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-family: 'Vremena Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }
    .fetch-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .fetch-btn:active { transform: translateY(0); }
    .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Error */
    .error-box {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(220, 80, 60, 0.1);
      border: 1px solid rgba(220, 80, 60, 0.25);
      color: #e07060;
      font-size: 0.85rem;
      display: none;
    }
    .error-box.visible { display: block; }

    /* Loading */
    .loading-section {
      text-align: center;
      padding: 60px 0;
      display: none;
    }
    .loading-section.visible { display: block; }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* Results header */
    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
      display: none;
    }
    .results-header.visible { display: flex; }
    .results-title {
      font-family: 'Instrument Serif', serif;
      font-family: 'Vremena Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1.6rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .export-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-family: 'Vremena Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .export-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Grid */
    .shows-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 18px;
      margin-bottom: 80px;
    }

    /* Card */
    .show-card {
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: default;
      transition: transform 0.22s cubic-bezier(.22,1,.36,1),
                  box-shadow 0.22s cubic-bezier(.22,1,.36,1),
                  border-color 0.22s;
      animation: fadeUp 0.4s ease both;
    }
    .show-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px var(--shadow);
      border-color: var(--accent);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .show-card:nth-child(1)  { animation-delay: 0.02s; }
    .show-card:nth-child(2)  { animation-delay: 0.04s; }
    .show-card:nth-child(3)  { animation-delay: 0.06s; }
    .show-card:nth-child(4)  { animation-delay: 0.08s; }
    .show-card:nth-child(5)  { animation-delay: 0.10s; }
    .show-card:nth-child(6)  { animation-delay: 0.12s; }
    .show-card:nth-child(7)  { animation-delay: 0.14s; }
    .show-card:nth-child(8)  { animation-delay: 0.16s; }
    .show-card:nth-child(9)  { animation-delay: 0.18s; }
    .show-card:nth-child(10) { animation-delay: 0.20s; }

    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }
    .card-no-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1.8rem;
    }
    .card-info {
      padding: 10px 12px 12px;
    }
    .card-title-text {
      font-size: 0.8rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 48px;
      opacity: 0.5;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: 0 8px 32px var(--shadow);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(.22,1,.36,1);
      z-index: 999;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast-icon { color: var(--accent); }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-word">List<span style="color: #2f8272;">izd</span></span>
      <span class="logo-dot"></span>
    </div>
    <button class="theme-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">☀️</button>
  </header>

  <!-- Hero -->
  <section class="hero">
    <!-- <h1 class="hero-title">Your Serializd list,<br><em>beautifully filtered.</em></h1> -->
    <h1 class="hero-title">Extract and Export<br><em>any Serializd list</em></h1>
    <!-- <p class="hero-sub">Paste any public list URL and see all shows at a glance.</p> -->
    <p class="hero-sub">Paste any public Serializd list URL and instantly get every show — titles, posters and total watch time.</p>
  </section>

  <div class="divider"></div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-box">
      <input
        type="url"
        class="url-input"
        id="urlInput"
        placeholder="https://www.serializd.com/list/…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="fetch-btn" id="fetchBtn" onclick="fetchList()">Load List</button>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Loading -->
  <div class="loading-section" id="loadingSection">
    <div class="spinner"></div>
    <p class="loading-text">Fetching your list — this may take a few seconds…</p>
  </div>

  <!-- Results -->
  <div class="results-header" id="resultsHeader">
    <div>
      <span class="results-title">Your list</span>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <button class="export-btn" onclick="exportText()">
      <span>↓</span> Export as text
    </button>
  </div>

  <div class="shows-grid" id="showsGrid"></div>

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toastMsg">Copied to clipboard!</span>
</div>

<footer style="text-align:center; color:var(--text-muted); font-size:0.8rem; padding-bottom:40px;">
  Built for Serializd users • Not affiliated with Serializd
</footer>

<script>
  const API_BASE = window.location.origin; // same origin as FastAPI
  let currentShows = [];

  // ── Theme toggle ──────────────────────────────────────────────
  const html = document.documentElement;
  const themeBtn = document.getElementById("themeToggle");

  function applyTheme(t) {
    html.setAttribute("data-theme", t);
    themeBtn.textContent = t === "dark" ? "☀️" : "🌙";
    localStorage.setItem("slv-theme", t);
  }

  themeBtn.addEventListener("click", () => {
    applyTheme(html.getAttribute("data-theme") === "dark" ? "light" : "dark");
  });

  // Restore saved theme
  applyTheme(localStorage.getItem("slv-theme") || "dark");


  // ── Fetch list ────────────────────────────────────────────────
  async function fetchList() {
    const url = document.getElementById("urlInput").value.trim();
    const errorBox = document.getElementById("errorBox");
    const loadingSection = document.getElementById("loadingSection");
    const resultsHeader = document.getElementById("resultsHeader");
    const showsGrid = document.getElementById("showsGrid");
    const fetchBtn = document.getElementById("fetchBtn");

    // Reset
    errorBox.classList.remove("visible");
    errorBox.textContent = "";
    resultsHeader.classList.remove("visible");
    showsGrid.innerHTML = "";
    currentShows = [];

    if (!url) {
      showError("Please enter a Serializd list URL.");
      return;
    }
    if (!url.includes("serializd.com")) {
      showError("URL must be from serializd.com");
      return;
    }

    // Loading state
    fetchBtn.disabled = true;
    loadingSection.classList.add("visible");

    try {
      const resp = await fetch(`${API_BASE}/scrape`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });

      const data = await resp.json();

      if (!resp.ok) {
        throw new Error(data.detail || "An error occurred.");
      }

      currentShows = data.shows;
      renderShows(data.shows);

    } catch (err) {
      showError(err.message || "Failed to connect to the backend.");
    } finally {
      fetchBtn.disabled = false;
      loadingSection.classList.remove("visible");
    }
  }

  // Allow Enter key
  document.getElementById("urlInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") fetchList();
  });

  function showError(msg) {
    const box = document.getElementById("errorBox");
    box.textContent = msg;
    box.classList.add("visible");
  }

  function renderShows(shows) {
    const grid = document.getElementById("showsGrid");
    const header = document.getElementById("resultsHeader");
    const count = document.getElementById("resultsCount");

    count.textContent = ` — ${shows.length} show${shows.length !== 1 ? "s" : ""}`;
    header.classList.add("visible");

    grid.innerHTML = shows
      .map((show, i) => `
        <div class="show-card" style="animation-delay:${Math.min(i * 0.025, 0.4)}s">
          ${
            show.poster
              ? `<img class="card-poster" src="${escHtml(show.poster)}" alt="${escHtml(show.title)}" loading="lazy" onerror="this.replaceWith(makeFallback())" />`
              : `<div class="card-no-poster">🎬</div>`
          }
          <div class="card-info">
            <div class="card-title-text">${escHtml(show.title)}</div>
          </div>
        </div>
      `)
      .join("");
  }

  function makeFallback() {
    const d = document.createElement("div");
    d.className = "card-no-poster";
    d.textContent = "🎬";
    return d;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }


  // ── Export as text ────────────────────────────────────────────
  function exportText() {
    if (!currentShows.length) return;
    const text = currentShows.map((s, i) => `${i + 1}. ${s.title}`).join("\n");

    navigator.clipboard.writeText(text).then(() => {
      showToast("List copied to clipboard!");
    }).catch(() => {
      // Fallback: download as file
      const blob = new Blob([text], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "serializd-list.txt";
      a.click();
      showToast("Saved as serializd-list.txt");
    });
  }

  function showToast(msg) {
    const toast = document.getElementById("toast");
    document.getElementById("toastMsg").textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }
</script>

</body>
</html>
